# =================================================================
#    SENTIRIC PLATFORM - DOCKER PUBLISH (Telephony Action Service)
# =================================================================
name: Docker Image CI

on:
  push:
    # Hem main branch'e kod gelince hem de v* formatında tag atılınca imaj basar
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  workflow_dispatch:

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract service name from repository name
        id: get_service_name
        run: |
          REPO_NAME="${{ github.repository }}"
          echo "SERVICE_NAME=${REPO_NAME#*/}" >> $GITHUB_ENV

      - name: Prepare Build Arguments
        id: prep
        run: |
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV
          echo "GIT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          # Cargo.toml içindeki version = "1.0.1" değerini otomatik okur
          echo "SERVICE_VERSION=$(grep '^version =' Cargo.toml | awk -F '\"' '{print $2}')" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # İmajı hem 'latest' hem de 'v1.0.1-hash' olarak tagler
          tags: ghcr.io/${{ github.repository }}:latest, ghcr.io/${{ github.repository }}:${{ env.SERVICE_VERSION }}-${{ env.GIT_COMMIT }}
          build-args: |
            SERVICE_NAME=${{ env.SERVICE_NAME }}
            BUILD_DATE=${{ env.BUILD_DATE }}
            GIT_COMMIT=${{ env.GIT_COMMIT }}
            SERVICE_VERSION=${{ env.SERVICE_VERSION }}
          no-cache: true